# Publishes to GitHub Packages when a GitHub Release is created (same pattern as timeless-sdk).
# https://docs.github.com/en/actions/publishing-packages/publishing-java-packages-with-gradle

name: Gradle Package

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # build.gradle reads VERSION for the published artifact (JitPack uses the same).
      - name: Set version from release tag
        if: github.event_name == 'release'
        run: echo "VERSION=${{ github.event.release.tag_name }}" >> "$GITHUB_ENV"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew build --no-daemon -PbootVersion=3.5.4

      - name: Publish to GitHub Packages
        run: ./gradlew publish --no-daemon
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
