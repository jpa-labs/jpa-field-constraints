plugins {
    id 'java-library'
    id 'maven-publish'
    id 'jacoco'
}

// JitPack artifact: com.github.jpa-labs:jpa-field-constraints:TAG (see https://jitpack.io/#jpa-labs/jpa-field-constraints)
// Java packages remain io.github.jpa_labs.jpafieldconstraints.*
group = 'com.github.jpa-labs'
def bootVersion = (findProperty('bootVersion') ?: '3.5.4').toString()

def envVersion = System.getenv('VERSION')
version = (envVersion != null && !envVersion.isBlank()) ? envVersion.trim() : '0.0.1-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
    withSourcesJar()
    withJavadocJar()
}

repositories {
    mavenCentral()
}

dependencies {
    compileOnly platform("org.springframework.boot:spring-boot-dependencies:${bootVersion}")
    api 'jakarta.validation:jakarta.validation-api'
    api 'jakarta.persistence:jakarta.persistence-api'

    compileOnly 'org.springframework:spring-context'
    compileOnly 'org.springframework.boot:spring-boot-autoconfigure'

    testImplementation platform("org.springframework.boot:spring-boot-dependencies:${bootVersion}")
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    testImplementation 'org.springframework.boot:spring-boot-starter-validation'
    testImplementation 'com.google.testing.compile:compile-testing:0.21.0'
    testRuntimeOnly 'com.h2database:h2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
    useJUnitPlatform()
    finalizedBy tasks.named('jacocoTestReport')
}

tasks.named('jacocoTestReport') {
    dependsOn tasks.named('test')
    reports {
        xml.required = true
        html.required = true
        csv.required = false
    }
}

publishing {
    publications {
        maven(MavenPublication) {
            from components.java
            groupId = project.group.toString()
            artifactId = 'jpa-field-constraints'
            version = project.version.toString()
            pom {
                name = 'jpa-field-constraints'
                description =
                    'JPA-backed Bean Validation constraints for Spring Boot (runtime + optional annotation processor).'
                url = 'https://github.com/jpa-labs/jpa-field-constraints'
                licenses {
                    license {
                        name = 'The Apache License, Version 2.0'
                        url = 'http://www.apache.org/licenses/LICENSE-2.0.txt'
                    }
                }
            }
        }
    }
    repositories {
        maven {
            name = 'GitHubPackages'
            url = uri('https://maven.pkg.github.com/jpa-labs/jpa-field-constraints')
            credentials {
                username =
                    System.getenv('GITHUB_ACTOR')
                        ?: System.getenv('GITHUB_USERNAME')
                        ?: (findProperty('gpr.user')?.toString() ?: '')
                password = System.getenv('GITHUB_TOKEN') ?: (findProperty('gpr.key')?.toString() ?: '')
            }
        }
    }
}
